<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Plutus Architect IDE</title>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.39.0/min/vs/loader.js"></script>
    <style>
        :root { --bg: #1e1e1e; --panel: #252526; --border: #333; --accent: #007acc; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: #d4d4d4; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        .layout { display: flex; flex-direction: column; height: 100vh; }

        /* ── Toolbar ── */
        .toolbar {
            height: 50px; background: #333; display: flex; align-items: center;
            padding: 0 16px; gap: 10px; border-bottom: 1px solid #000; flex-shrink: 0;
        }
        .toolbar button {
            background: var(--accent); color: white; border: none;
            padding: 7px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px;
        }
        .toolbar button:hover:not(:disabled) { background: #005f9e; }
        .toolbar button:disabled { background: #555; cursor: not-allowed; }
        .toolbar button.sec { background: #444; }
        .toolbar button.sec:hover:not(:disabled) { background: #555; }
        .toolbar button.run-file { background: #1e7a1e; }
        .toolbar button.run-file:hover:not(:disabled) { background: #165c16; }
        #activeFile { font-size: 12px; color: #4ec9b0; font-family: monospace; }
        #statusEl { font-size: 12px; color: #888; }
        .sep { width: 1px; height: 24px; background: #555; margin: 0 4px; }

        /* ── Body ── */
        .body { display: flex; flex: 1; min-height: 0; }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px; background: #252526; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .sidebar-header {
            padding: 9px 12px; font-size: 10px; font-weight: bold;
            text-transform: uppercase; color: #888; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; gap: 4px;
        }
        .sidebar-header span { font-size: 10px; font-weight: normal; text-transform: none; }
        .ico-btn {
            background: none; border: none; color: #777; cursor: pointer;
            font-size: 14px; padding: 1px 5px; border-radius: 3px;
        }
        .ico-btn:hover { background: #383838; color: #ccc; }
        .sidebar-path {
            padding: 3px 12px; font-size: 10px; font-family: monospace;
            color: #555; background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .file-list { flex: 1; overflow-y: auto; }
        .file-item {
            padding: 5px 12px; font-size: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            border-left: 3px solid transparent;
            white-space: nowrap; overflow: hidden; user-select: none;
        }
        .file-item:hover { background: #2a2d2e; }
        .file-item.active { background: #37373d; border-left-color: var(--accent); color: white; }
        .file-item.is-dir { color: #dcb67a; }
        .file-item.back { color: #666; border-bottom: 1px solid #2a2a2a; font-style: italic; }
        .file-item-label { display: flex; align-items: center; gap: 7px; overflow: hidden; text-overflow: ellipsis; }
        .compile-ico {
            opacity: 0; font-size: 11px; color: #4ec9b0; flex-shrink: 0;
            padding: 1px 5px; border-radius: 3px; background: #1e3a1e;
        }
        .file-item:hover .compile-ico { opacity: 1; }
        .file-list::-webkit-scrollbar { width: 4px; }
        .file-list::-webkit-scrollbar-thumb { background: #3a3a3a; }

        /* ── Editor zone ── */
        .editor-zone { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        #editor { flex: 2; border-bottom: 2px solid var(--border); min-height: 0; }

        /* ── Results ── */
        .results { flex: 1; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border); min-height: 0; }
        .panel { background: var(--panel); display: flex; flex-direction: column; min-height: 0; }
        .panel-header {
            background: #2d2d2d; padding: 7px 12px; font-size: 11px;
            text-transform: uppercase; color: #aaa; border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .panel-content {
            flex: 1; overflow-y: auto; padding: 12px;
            font-family: 'Consolas', monospace; font-size: 12px;
            white-space: pre-wrap; word-break: break-all;
        }
        .comp-log { color: #85d7ff; }
        .std-log  { color: #b5cea8; }
        .cbor-log { color: #ce9178; cursor: pointer; }
        .cbor-log:hover { opacity: 0.85; }
        .panel-content::-webkit-scrollbar { width: 6px; }
        .panel-content::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        /* ── Modal ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 100;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #2d2d2d; border: 1px solid #444; border-radius: 6px;
            padding: 24px; width: 420px; display: flex; flex-direction: column; gap: 14px;
        }
        .modal h3 { margin: 0; font-size: 14px; color: #ddd; }
        .modal label { font-size: 12px; color: #999; display: block; margin-bottom: 4px; }
        .modal input, .modal select {
            width: 100%; background: #1e1e1e; border: 1px solid #444; color: #ddd;
            padding: 7px 10px; border-radius: 4px; font-size: 13px; box-sizing: border-box;
        }
        .modal input:focus, .modal select:focus { outline: 1px solid var(--accent); }
        .modal-hint { font-size: 11px; color: #666; margin-top: -8px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
        .modal-actions button { padding: 7px 18px; font-size: 12px; }
        .modal-actions button.cancel { background: #444; }
    </style>
</head>
<body>

<!-- MODAL création fichier -->
<div id="modalOverlay" class="modal-overlay">
    <div class="modal">
        <h3>➕ Nouveau fichier Haskell</h3>
        <div>
            <label>Dossier de destination</label>
            <select id="modalDir"></select>
        </div>
        <div>
            <label>Nom du fichier</label>
            <input id="modalName" type="text" placeholder="ex: MyValidator.hs" />
            <p class="modal-hint">Le nom doit commencer par une majuscule et finir par .hs</p>
        </div>
        <div class="modal-actions">
            <button class="cancel" onclick="closeModal()">Annuler</button>
            <button onclick="confirmCreate()">Créer</button>
        </div>
    </div>
</div>

<div class="layout">
    <!-- TOOLBAR -->
    <div class="toolbar">
        <button id="runEditorBtn">▶ RUN (éditeur)</button>
        <button id="runFileBtn" class="run-file" disabled title="Sélectionnez un .hs dans la sidebar">▶ RUN fichier</button>
        <div class="sep"></div>
        <button id="saveBtn" class="sec">💾 Save</button>
        <button id="newFileBtn" class="sec">＋ Nouveau .hs</button>
        <div class="sep"></div>
        <span id="statusEl"></span>
        <span id="activeFile"></span>
    </div>

    <div class="body">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                Explorer
                <span>
                    <button class="ico-btn" onclick="openModal()" title="Nouveau fichier">＋</button>
                    <button class="ico-btn" onclick="refreshFiles()" title="Rafraîchir">↻</button>
                </span>
            </div>
            <div id="sidebarPath" class="sidebar-path">/app/code/wspace</div>
            <div id="fileList" class="file-list">
                <div style="padding:12px;font-size:11px;color:#555;">Chargement...</div>
            </div>
        </div>

        <!-- ÉDITEUR + PANELS -->
        <div class="editor-zone">
            <div id="editor"></div>
            <div class="results">
                <div class="panel">
                    <div class="panel-header">Compilation (GHC)</div>
                    <div id="logs" class="panel-content comp-log"></div>
                </div>
                <div class="panel">
                    <div class="panel-header">Standard Output</div>
                    <div id="std" class="panel-content std-log"></div>
                </div>
                <div class="panel">
                    <div class="panel-header">
                        Plutus CBOR
                        <span style="font-size:9px;color:#666;text-transform:none;">(cliquer = copier)</span>
                    </div>
                    <div id="cbor" class="panel-content cbor-log" onclick="copyCBOR()" title="Cliquer pour copier"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ── ELEMENTS ──
    const logsEl     = document.getElementById('logs');
    const stdEl      = document.getElementById('std');
    const cborEl     = document.getElementById('cbor');
    const statusEl   = document.getElementById('statusEl');
    const activeFileEl = document.getElementById('activeFile');
    const runEditorBtn = document.getElementById('runEditorBtn');
    const runFileBtn   = document.getElementById('runFileBtn');
    const saveBtn      = document.getElementById('saveBtn');

    // ── STATE ──
    let currentSidebarPath = "";   // chemin relatif sous /app/code/wspace
    let selectedFilePath   = null; // fichier sélectionné dans la sidebar (fullPath)
    let selectedFileName   = null; // juste le nom du fichier
    let allDirs = [];              // liste des dossiers connus pour le modal

    // ── INIT MONACO ──
    require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.39.0/min/vs' }});
    require(['vs/editor/editor.main'], function () {
        window.editor = monaco.editor.create(document.getElementById('editor'), {
            value: "module MyContract where\n\n-- validatorScript = ...\n",
            language: 'haskell',
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 14,
            minimap: { enabled: false },
            scrollbar: { vertical: 'visible' }
        });
        refreshFiles();
    });

    // ══════════════════════════════════════
    //  SIDEBAR
    // ══════════════════════════════════════
    async function refreshFiles() {
        try {
            const res = await fetch(`/workspace/files?path=${encodeURIComponent(currentSidebarPath)}`);
            const items = await res.json();

            document.getElementById('sidebarPath').textContent =
                '/app/code/wspace' + (currentSidebarPath ? '/' + currentSidebarPath : '');

            // Collecte des dossiers pour le modal
            items.filter(i => i.isDirectory).forEach(i => {
                if (!allDirs.includes(i.fullPath)) allDirs.push(i.fullPath);
            });

            const sorted = [...items].sort((a, b) => {
                if (a.isDirectory && !b.isDirectory) return -1;
                if (!a.isDirectory && b.isDirectory) return 1;
                return a.name.localeCompare(b.name);
            });

            let html = '';
            if (currentSidebarPath !== '') {
                html += `<div class="file-item back" onclick="sidebarGoBack()">📁 ..</div>`;
            }
            if (sorted.length === 0) {
                html += `<div style="padding:10px 12px;font-size:11px;color:#555;font-style:italic;">Dossier vide</div>`;
            }

            sorted.forEach(item => {
                const icon = item.isDirectory ? '📁' : (item.name.endsWith('.hs') ? 'λ' : '📄');
                const activeClass = item.fullPath === selectedFilePath ? 'active' : '';
                const dirClass    = item.isDirectory ? 'is-dir' : '';
                const sp = item.fullPath.replace(/\\/g, '/').replace(/'/g, "\\'");
                const sn = item.name.replace(/'/g, "\\'");

                const clickAction = item.isDirectory
                    ? `sidebarNavigate('${sp}')`
                    : `selectFile('${sp}', '${sn}')`;

                // Bouton ▶ visible au hover uniquement sur les .hs
                const compileBtn = (!item.isDirectory && item.name.endsWith('.hs'))
                    ? `<span class="compile-ico" onclick="event.stopPropagation(); runWorkspaceFile('${sp}', '${sn}')" title="Compiler ce fichier">▶</span>`
                    : '';

                html += `
                    <div class="file-item ${dirClass} ${activeClass}" onclick="${clickAction}">
                        <div class="file-item-label">${icon} ${item.name}</div>
                        ${compileBtn}
                    </div>`;
            });

            document.getElementById('fileList').innerHTML = html;
        } catch (e) {
            document.getElementById('fileList').innerHTML =
                `<div style="padding:10px;color:#f44;font-size:11px;">Erreur connexion Docker</div>`;
        }
    }

    function sidebarNavigate(fullPath) {
        currentSidebarPath = fullPath;
        refreshFiles();
    }

    function sidebarGoBack() {
        const parts = currentSidebarPath.split('/').filter(p => p);
        parts.pop();
        currentSidebarPath = parts.join('/');
        refreshFiles();
    }

    // Sélectionne un fichier et le charge dans l'éditeur
    async function selectFile(fullPath, fileName) {
        try {
            const res = await fetch(`/workspace/file?name=${encodeURIComponent(fullPath)}`);
            if (!res.ok) throw new Error(await res.text());

            window.editor.setValue(await res.text());

            const ext = fileName.split('.').pop().toLowerCase();
            const langMap = { hs: 'haskell', json: 'json', md: 'markdown' };
            monaco.editor.setModelLanguage(window.editor.getModel(), langMap[ext] || 'plaintext');

            selectedFilePath = fullPath;
            selectedFileName = fileName;
            activeFileEl.textContent = '> ' + fileName;

            // Active le bouton RUN fichier si c'est un .hs
            runFileBtn.disabled = !fileName.endsWith('.hs');

            refreshFiles();
        } catch (e) {
            alert('Erreur ouverture : ' + e.message);
        }
    }

    // ══════════════════════════════════════
    //  SAUVEGARDE
    // ══════════════════════════════════════
    saveBtn.onclick = async () => {
        if (!selectedFilePath) return alert("Aucun fichier sélectionné dans la sidebar");
        const res = await fetch('/workspace/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filePath: selectedFilePath, content: window.editor.getValue() })
        });
        if (res.ok) {
            setStatus('Sauvegardé ✓', '#4ec9b0');
            setTimeout(() => setStatus('', '#888'), 2000);
        } else {
            setStatus('Erreur sauvegarde', '#f44');
        }
    };

    // ══════════════════════════════════════
    //  MODAL CRÉATION FICHIER
    // ══════════════════════════════════════
    document.getElementById('newFileBtn').onclick = openModal;

    function openModal() {
        // Popule le select des dossiers
        const sel = document.getElementById('modalDir');
        sel.innerHTML = `<option value="lecture">lecture/ (racine workspace)</option>`;
        allDirs.forEach(d => {
            sel.innerHTML += `<option value="${d}">${d}/</option>`;
        });
        document.getElementById('modalName').value = '';
        document.getElementById('modalOverlay').classList.add('open');
        setTimeout(() => document.getElementById('modalName').focus(), 100);
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('open');
    }

    // Fermer en cliquant l'overlay
    document.getElementById('modalOverlay').onclick = (e) => {
        if (e.target === document.getElementById('modalOverlay')) closeModal();
    };

    async function confirmCreate() {
        const dir  = document.getElementById('modalDir').value;
        const name = document.getElementById('modalName').value.trim();

        if (!name) return alert("Entrez un nom de fichier");
        if (!name.endsWith('.hs')) return alert("Le fichier doit se terminer par .hs");
        if (!/^[A-Z]/.test(name)) return alert("Le nom doit commencer par une majuscule (convention Haskell)");

        const moduleName = name.replace('.hs', '');
        const filePath   = `${dir}/${name}`;
        const content    = `module ${moduleName} where\n\nimport PlutusTx qualified\nimport PlutusLedgerApi.V2\n\n-- | Validateur Plutus\nvalidatorScript :: Validator\nvalidatorScript = undefined\n`;

        const res = await fetch('/workspace/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filePath, content })
        });

        if (!res.ok) {
            alert('Erreur création : ' + await res.text());
            return;
        }

        closeModal();

        // Navigation vers le dossier du fichier créé et ouverture
        currentSidebarPath = dir;
        await refreshFiles();
        await selectFile(filePath, name);
    }

    // Enter dans le modal = confirmer
    document.getElementById('modalName').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') confirmCreate();
        if (e.key === 'Escape') closeModal();
    });

    // ══════════════════════════════════════
    //  COMPILATION
    // ══════════════════════════════════════

    // Bouton RUN éditeur (comportement original)
    runEditorBtn.onclick = () => runCode({ code: window.editor.getValue() });

    // Bouton RUN fichier (fichier workspace sélectionné)
    runFileBtn.onclick = () => {
        if (!selectedFileName) return;
        runWorkspaceFile(selectedFilePath, selectedFileName);
    };

    // Compile un .hs directement depuis le workspace (icône ▶ dans sidebar)
    function runWorkspaceFile(fullPath, fileName) {
        // Sauvegarde auto si c'est le fichier ouvert dans l'éditeur
        if (fullPath === selectedFilePath) {
            fetch('/workspace/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filePath: fullPath, content: window.editor.getValue() })
            }).then(() => runCode({ fileName: path.basename(fileName) }));
        } else {
            runCode({ fileName: fileName });
        }
    }

    // Fonction commune de compilation via SSE
    async function runCode(body) {
        runEditorBtn.disabled = true;
        runFileBtn.disabled   = true;
        setStatus('Compilation...', '#f0a500');
        logsEl.textContent = '';
        stdEl.textContent  = '';
        cborEl.textContent = '';

        let hasError = false;

        try {
            const response = await fetch('http://localhost:3000/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const reader  = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    try {
                        const { type, output } = JSON.parse(line.slice(6));
                        if (type === 'compilation') {
                            logsEl.textContent += output;
                            logsEl.scrollTop = logsEl.scrollHeight;
                            if (output.toLowerCase().includes('error')) hasError = true;
                        } else if (type === 'cbor') {
                            cborEl.textContent = output;
                        } else {
                            stdEl.textContent += output;
                            stdEl.scrollTop = stdEl.scrollHeight;
                        }
                    } catch (e) {}
                }
            }

            setStatus(hasError ? 'Erreur' : 'Succès ✓', hasError ? '#f44747' : '#4ec9b0');
        } catch (e) {
            logsEl.textContent += `\nErreur réseau : ${e.message}`;
            setStatus('Erreur réseau', '#f44747');
        }

        runEditorBtn.disabled = false;
        runFileBtn.disabled   = !selectedFileName?.endsWith('.hs');
    }

    // ══════════════════════════════════════
    //  UTILS
    // ══════════════════════════════════════
    function setStatus(msg, color) {
        statusEl.textContent  = msg;
        statusEl.style.color  = color || '#888';
    }

    function copyCBOR() {
        const text = cborEl.textContent;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
            cborEl.style.outline = '1px solid #4ec9b0';
            setTimeout(() => cborEl.style.outline = '', 700);
        });
    }

    // Polyfill path.basename côté browser
    const path = { basename: (p) => p.split('/').filter(Boolean).pop() || p };
</script>
</body>
</html>
