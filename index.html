<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plutus Architect IDE</title>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.39.0/min/vs/loader.js"></script>
    <!-- Lucid chargé comme ES module et exposé en globale -->
    <script type="module">
        import { Lucid, Blockfrost } from "https://unpkg.com/lucid-cardano@0.10.11/web/mod.js";
        window.Lucid      = Lucid;
        window.Blockfrost = Blockfrost;
        window._lucidReady = true;
        window.dispatchEvent(new Event('lucid-ready'));
    </script>
    <style>
        /* ══════════════════════════════════════════════════════════
           PLUTUS IDE — Redesigned Layout
           Palette aligned with login.html:
             bg:      #0a0a0f  (login --bg)
             surface: #111118  (login --surface)
             border:  #1e1e2e  (login --border)
             accent:  #7c3aed  (login --accent)
             text:    #e2e8f0  (login --text)
           ══════════════════════════════════════════════════════════ */
        :root {
            --bg:      #0a0a0f;
            --surface: #111118;
            --surface2:#16161f;
            --border:  #1e1e2e;
            --border2: #2d2d3d;
            --accent:  #7c3aed;
            --accent2: #5b21b6;
            --cyan:    #06b6d4;
            --text:    #e2e8f0;
            --muted:   #4a5568;
            --error:   #f87171;
            --success: #34d399;
            --warn:    #fbbf24;
            --toolbar-h: 48px;
            --term-h:  200px;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body, html {
            margin:0; padding:0; height:100vh;
            background:var(--bg); color:var(--text);
            font-family:'Segoe UI',system-ui,sans-serif;
            overflow:hidden;
        }

        /* ── Grid layout ──────────────────────────────────────────
           [toolbar]
           [sidebar | editor | output-panels]
           [terminal — full width]
        ─────────────────────────────────────────────────────────── */
        .layout {
            display: grid;
            grid-template-rows: var(--toolbar-h) 1fr var(--term-h);
            grid-template-columns: 220px 1fr 340px;
            grid-template-areas:
                "toolbar  toolbar  toolbar"
                "sidebar  editor   panels"
                "terminal terminal terminal";
            height: 100vh;
            overflow: hidden;
        }

        /* ── Toolbar ──────────────────────────────────────────── */
        .toolbar {
            grid-area: toolbar;
            height: var(--toolbar-h);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 14px; gap: 7px;
            flex-shrink: 0;
        }
        .logo-small {
            font-size: 18px; font-weight: 800; color: var(--accent);
            margin-right: 2px; flex-shrink: 0; letter-spacing: -1px;
        }
        .toolbar button {
            background: var(--accent); color: white; border: none;
            padding: 6px 11px; border-radius: 5px; cursor: pointer;
            font-weight: 700; font-size: 11px; flex-shrink: 0;
            white-space: nowrap; letter-spacing: 0.5px;
            transition: background 0.15s, transform 0.1s;
        }
        .toolbar button:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); }
        .toolbar button:disabled { background: #2a2a3a; color: #555; cursor: not-allowed; transform: none; }
        .toolbar button.sec { background: var(--border2); }
        .toolbar button.sec:hover:not(:disabled) { background: #383850; }
        .toolbar button.run-file { background: #064e3b; }
        .toolbar button.run-file:hover:not(:disabled) { background: #065f46; }
        #connectWalletBtn { max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
        #connectWalletBtn.connected { background: #065f46; }
        #connectWalletBtn.connected:hover { background: #7f1d1d; }
        #connectWalletBtn.connected:hover::after { content: ' (disconnect)'; font-size: 10px; }
        #templateSelect {
            background: var(--surface2); color: #9ca3af;
            border: 1px solid var(--border2); border-radius: 5px;
            padding: 5px 8px; font-size: 11px; cursor: pointer;
            flex-shrink: 0; max-width: 145px; outline: none;
        }
        #templateSelect:focus { border-color: var(--accent); }
        #downloadBtn { background: #1e3a5f !important; }
        #downloadBtn:hover:not(:disabled) { background: #1e4976 !important; }
        #downloadBtn:disabled { opacity: 0.35; }
        #validatorNameInput {
            background: var(--surface2); border: 1px solid var(--border2);
            color: var(--text); padding: 5px 10px; border-radius: 5px;
            font-family: 'Consolas', monospace; font-size: 12px;
            width: 140px; flex-shrink: 0; outline: none;
        }
        #validatorNameInput:focus { border-color: var(--accent); }
        #validatorNameInput::placeholder { color: #555; }
        #activeFile { font-size: 11px; color: #a78bfa; font-family: 'Consolas', monospace; flex-shrink: 0; }
        #statusEl   { font-size: 11px; color: #888; flex-shrink: 0; }
        .sep { width: 1px; height: 22px; background: var(--border2); margin: 0 1px; flex-shrink: 0; }
        .spacer { flex: 1; min-width: 0; }
        .user-badge {
            display: flex; align-items: center; gap: 7px; flex-shrink: 0;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 20px; padding: 3px 12px 3px 6px; font-size: 11px; color: #a78bfa;
        }
        .user-avatar {
            width: 22px; height: 22px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; color: white; flex-shrink: 0;
        }
        .logout-btn {
            background: none !important; border: none; color: var(--muted) !important;
            cursor: pointer; font-size: 12px; padding: 0 0 0 4px !important;
            white-space: nowrap; transition: color 0.15s;
        }
        .logout-btn:hover { color: var(--error) !important; }

        /* ── Sidebar ──────────────────────────────────────────── */
        .sidebar {
            grid-area: sidebar;
            background: var(--surface2);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            min-height: 0; overflow: hidden;
        }
        .sidebar-header {
            padding: 9px 12px; font-size: 9px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px; color: var(--muted);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        .ico-btn {
            background: none; border: none; color: var(--muted);
            cursor: pointer; font-size: 13px; padding: 2px 5px;
            border-radius: 3px; transition: all 0.15s;
        }
        .ico-btn:hover { background: var(--border2); color: var(--text); }
        .sidebar-path {
            padding: 4px 12px; font-size: 10px; font-family: 'Consolas', monospace;
            color: #3a3a5c; background: var(--bg); border-bottom: 1px solid var(--border);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0;
        }
        .file-list { flex: 1; overflow-y: auto; }
        .file-list::-webkit-scrollbar { width: 3px; }
        .file-list::-webkit-scrollbar-thumb { background: var(--border2); }
        .file-item {
            padding: 5px 12px; font-size: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            border-left: 2px solid transparent;
            white-space: nowrap; overflow: hidden; user-select: none;
            transition: background 0.1s;
        }
        .file-item:hover { background: #1a1a2e; }
        .file-item.active { background: #1e1e38; border-left-color: var(--accent); color: white; }
        .file-item.is-dir { color: #a78bfa; }
        .file-item.back { color: var(--muted); border-bottom: 1px solid var(--border); font-style: italic; }
        .file-item-label { display: flex; align-items: center; gap: 7px; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
        .compile-ico {
            opacity: 0; font-size: 10px; color: var(--success); flex-shrink: 0;
            padding: 1px 5px; border-radius: 3px; background: #064e3b;
            transition: opacity 0.15s;
        }
        .file-item:hover .compile-ico { opacity: 1; }
        .file-actions { display: flex; gap: 2px; flex-shrink: 0; opacity: 0; transition: opacity 0.1s; }
        .file-item:hover .file-actions { opacity: 1; }
        .file-act-btn {
            background: none; border: none; cursor: pointer; padding: 1px 5px;
            border-radius: 3px; font-size: 11px; color: var(--muted); line-height: 1;
        }
        .file-act-btn:hover { background: #3a1f1f; color: var(--error); }

        /* ── Editor ───────────────────────────────────────────── */
        .editor-zone {
            grid-area: editor;
            display: flex; flex-direction: column;
            min-width: 0; min-height: 0; overflow: hidden;
            border-right: 1px solid var(--border);
        }
        #editor { flex: 1; min-height: 0; }

        /* ── Output panels (right column, tabbed) ─────────────── */
        .panels-zone {
            grid-area: panels;
            display: flex; flex-direction: column;
            min-height: 0; overflow: hidden;
            background: var(--surface2);
        }
        .panels-tabs {
            display: flex; background: var(--bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .ptab {
            padding: 7px 12px; font-size: 10px; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            color: var(--muted); cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.15s; white-space: nowrap;
            flex-shrink: 0;
        }
        .ptab:hover { color: var(--text); background: var(--surface); }
        .ptab.active { color: var(--text); border-bottom-color: var(--accent); background: var(--surface2); }
        .ptab .tab-dot {
            display: inline-block; width: 5px; height: 5px;
            border-radius: 50%; margin-right: 5px; vertical-align: middle;
            background: currentColor; opacity: 0.5;
        }
        .ptab.active .tab-dot { opacity: 1; }
        .ptab[data-tab="logs"]  .tab-dot { background: #85d7ff; }
        .ptab[data-tab="std"]   .tab-dot { background: var(--success); }
        .ptab[data-tab="cbor"]  .tab-dot { background: var(--warn); }
        .ptab[data-tab="addr"]  .tab-dot { background: #a78bfa; }

        .panel-body {
            flex: 1; min-height: 0; overflow: hidden;
            display: none; flex-direction: column;
        }
        .panel-body.active { display: flex; }
        .panel-content {
            flex: 1; overflow-y: auto; padding: 12px;
            font-family: 'Consolas', monospace; font-size: 12px;
            white-space: pre-wrap; word-break: break-all; line-height: 1.6;
        }
        .panel-content::-webkit-scrollbar { width: 3px; }
        .panel-content::-webkit-scrollbar-thumb { background: var(--border2); }
        .comp-log  { color: #85d7ff; }
        .std-log   { color: #86efac; }
        .cbor-log  { color: var(--warn); }
        .panel-content.copyable { cursor: pointer; }
        .panel-content.copyable:hover { background: #1a1a2a; }
        .copy-flash {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(52,211,153,0.07); color: var(--success);
            font-size: 14px; font-weight: 700; letter-spacing: 2px;
            pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 10;
            border: 1px solid rgba(52,211,153,0.2);
        }
        .copy-flash.show { opacity: 1; }
        .copy-flash.hide { opacity: 0; transition: opacity 0.4s ease-out; }
        /* Addresses */
        .addr-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 16px; }
        .addr-block { display: flex; flex-direction: column; gap: 6px; }
        .addr-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
        .addr-value {
            font-family: 'Consolas', monospace; font-size: 11px; line-height: 1.5;
            word-break: break-all; padding: 8px 10px; border-radius: 6px;
            border: 1px solid var(--border); background: var(--bg);
            cursor: pointer; transition: border-color 0.15s;
        }
        .addr-value:hover:not(.empty) { border-color: var(--accent); }
        .addr-value.validator { color: #a78bfa; }
        .addr-value.wallet    { color: var(--cyan); }
        .addr-value.empty     { color: #2d2d3d; font-style: italic; cursor: default; border-color: transparent; background: transparent; }
        .copy-ok { font-size: 10px; color: var(--success); min-height: 14px; }

        /* ── Terminal (bottom row, full width) ─────────────────── */
        .terminal-zone {
            grid-area: terminal;
            background: #070710;
            border-top: 1px solid var(--border);
            display: flex; flex-direction: column;
            min-height: 0; overflow: hidden;
        }
        .terminal-topbar {
            display: flex; align-items: center;
            padding: 0 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            gap: 12px; flex-shrink: 0; height: 32px;
        }
        .terminal-topbar .t-title {
            font-size: 10px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: var(--text);
            display: flex; align-items: center; gap: 7px;
        }
        .term-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--success); box-shadow: 0 0 6px #22c55e88;
            animation: pulse-dot 2.5s ease-in-out infinite;
        }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.35} }
        .terminal-topbar .t-hint {
            font-size: 10px; color: #2d2d3d; font-family: 'Consolas', monospace;
        }
        .t-clear-btn {
            margin-left: auto;
            background: none; border: 1px solid var(--border2); color: var(--muted);
            font-size: 9px; padding: 2px 8px; border-radius: 3px; cursor: pointer;
            font-family: 'Consolas', monospace; letter-spacing: 1px; text-transform: uppercase;
            transition: all 0.15s;
        }
        .t-clear-btn:hover { color: var(--text); border-color: #555; background: var(--surface2); }
        .terminal-output {
            flex: 1; overflow-y: auto; padding: 6px 14px 2px;
            font-family: 'Consolas', 'JetBrains Mono', monospace; font-size: 12px;
            line-height: 1.6; color: #c8d3f5; min-height: 0;
            scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
        }
        .terminal-output::-webkit-scrollbar { width: 3px; }
        .terminal-output::-webkit-scrollbar-thumb { background: var(--border2); }
        .term-line { display: block; white-space: pre-wrap; word-break: break-all; }
        .term-line.term-info    { color: #a78bfa; }
        .term-line.term-success { color: var(--success); }
        .term-line.term-error   { color: var(--error); }
        .term-line.term-warn    { color: var(--warn); }
        .term-line.term-cmd     { color: #7dd3fc; }
        .term-line.term-cbor    { color: #86efac; font-size: 10px; }
        .term-line.term-muted   { color: #2d2d3d; }
        .term-line.term-stdout  { color: #c8d3f5; }
        .terminal-input-row {
            display: flex; align-items: center;
            padding: 5px 14px; border-top: 1px solid var(--border);
            gap: 6px; background: var(--bg); flex-shrink: 0;
        }
        .terminal-prompt {
            color: var(--accent); font-family: 'Consolas', monospace;
            font-size: 13px; font-weight: bold; flex-shrink: 0; user-select: none;
        }
        .terminal-input {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--text); font-family: 'Consolas', monospace; font-size: 13px;
            caret-color: var(--accent); min-width: 0;
        }
        .terminal-input::placeholder { color: #2d2d3d; }
        .term-spinner {
            display: inline-block; width: 9px; height: 9px;
            border: 2px solid var(--border2); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.7s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Modals ───────────────────────────────────────────── */
        .modal-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
        .tog {
            flex: 1; padding: 6px; border-radius: 5px; border: 1px solid var(--border2);
            background: var(--bg); color: var(--muted); cursor: pointer; font-size: 12px;
            transition: all 0.15s;
        }
        .tog.active { background: #1e1a3a; border-color: var(--accent); color: #a78bfa; font-weight: 600; }
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); z-index: 100;
            align-items: center; justify-content: center;
            backdrop-filter: blur(3px);
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface); border: 1px solid var(--border2);
            border-radius: 10px; padding: 24px; width: 400px;
            display: flex; flex-direction: column; gap: 14px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }
        .modal h3 { margin: 0; font-size: 12px; color: #a78bfa; letter-spacing: 2px; text-transform: uppercase; }
        .modal label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }
        .modal input, .modal select {
            width: 100%; background: var(--bg); border: 1px solid var(--border2); color: var(--text);
            padding: 8px 10px; border-radius: 5px; font-family: 'Consolas', monospace;
            font-size: 13px; box-sizing: border-box; outline: none;
        }
        .modal input:focus { border-color: var(--accent); }
        .modal-hint { font-size: 10px; color: var(--muted); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
        .modal-actions button { padding: 7px 18px; font-size: 12px; border-radius: 5px; border: none; cursor: pointer; color: white; font-weight: bold; }
        .modal-actions .cancel  { background: var(--border2); }
        .modal-actions .confirm { background: var(--accent); }

        /* ── Toasts ───────────────────────────────────────────── */
        #toastContainer {
            position: fixed; top: 56px; right: 16px; z-index: 9999;
            display: flex; flex-direction: column; gap: 8px; pointer-events: none;
        }
        .toast {
            pointer-events: all; display: flex; align-items: flex-start; gap: 10px;
            min-width: 260px; max-width: 360px;
            background: var(--surface); border: 1px solid var(--border2);
            border-left: 3px solid var(--accent); border-radius: 8px;
            padding: 11px 13px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            font-family: 'Segoe UI', sans-serif;
            animation: toastIn 0.22s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        .toast.removing { animation: toastOut 0.18s ease-in forwards; }
        .toast.type-error { border-left-color: var(--error); }
        .toast.type-warn  { border-left-color: var(--warn);  }
        .toast.type-ok    { border-left-color: var(--success); }
        .toast.type-info  { border-left-color: var(--accent); }
        .toast-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
        .toast-body { flex: 1; min-width: 0; }
        .toast-title { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 3px; }
        .toast.type-error .toast-title { color: var(--error); }
        .toast.type-warn  .toast-title { color: var(--warn);  }
        .toast.type-ok    .toast-title { color: var(--success); }
        .toast.type-info  .toast-title { color: #a78bfa; }
        .toast-msg { font-size: 12px; color: #9ca3af; line-height: 1.5; word-break: break-word; }
        .toast-close { background: none; border: none; color: #3a3a5c; cursor: pointer; font-size: 16px; line-height: 1; padding: 0; flex-shrink: 0; transition: color 0.15s; }
        .toast-close:hover { color: var(--text); }
        @keyframes toastIn { from{opacity:0;transform:translateX(20px) scale(0.97)} to{opacity:1;transform:translateX(0) scale(1)} }
        @keyframes toastOut { from{opacity:1;transform:translateX(0) scale(1);max-height:200px} to{opacity:0;transform:translateX(20px) scale(0.95);max-height:0;padding:0;margin:0} }

        /* ── Resize handle (terminal height drag) ─────────────── */
        .resize-handle {
            grid-area: terminal;
            height: 4px; background: transparent; cursor: ns-resize;
            z-index: 50; position: relative;
            margin-top: -2px;
        }
        .resize-handle:hover, .resize-handle.dragging { background: var(--accent); }

        /* ── Version badge ────────────────────────────────────── */
        #versionBadge { font-size: 10px; color: #3a3a5c; cursor: pointer; flex-shrink: 0; transition: color 0.15s; }
        #versionBadge:hover { color: var(--muted); }

        /* ── Body split between sidebar / editor / panels ─────── */
        .body {
            grid-area: sidebar / sidebar / panels / panels;
            display: contents; /* children participate in outer grid */
        }

    </style>
</head>
<body>

<div id="toastContainer"></div>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal">
        <h3 id="modalTitle">+ New item</h3>
        <div class="modal-toggle">
            <button id="toggleFile"   class="tog active" onclick="setModalType('file')">📄 File</button>
            <button id="toggleFolder" class="tog"        onclick="setModalType('folder')">📁 Folder</button>
        </div>
        <div>
            <label>Location</label>
            <select id="modalDir"></select>
        </div>
        <div>
            <label id="modalNameLabel">File name</label>
            <input id="modalName" type="text" placeholder="ex: MyValidator.hs" />
            <p class="modal-hint" id="modalHint">Must start with uppercase, end with .hs</p>
        </div>
        <div class="modal-actions">
            <button class="cancel"  onclick="closeModal()">Cancel</button>
            <button class="confirm" id="modalConfirmBtn" onclick="confirmCreate()">Create</button>
        </div>
    </div>
</div>

<div id="deleteOverlay" class="modal-overlay">
    <div class="modal">
        <h3 style="color:#f87171">🗑 Delete</h3>
        <p id="deleteMsg" style="font-size:13px;color:#9ca3af;margin:8px 0 16px;"></p>
        <div class="modal-actions">
            <button class="cancel"  onclick="closeDeleteModal()">Cancel</button>
            <button class="confirm" id="deleteConfirmBtn" style="background:#7f1d1d;" onclick="confirmDelete()">Delete</button>
        </div>
    </div>
</div>

<div class="layout">

    <div class="toolbar">
        <span class="logo-small">⬡</span>
        <button id="connectWalletBtn" onclick="handleWalletBtn()">⬡ Connect Wallet</button>
        <div class="sep"></div>
        <select id="templateSelect" title="Load a template"><option value="">📄 Templates…</option></select>
        <div class="sep"></div>
        <input id="validatorNameInput" type="text" placeholder="validator name…" title="Name of your validator function" />

<script>
// ═══════════════════════════════════════════════════
//  TOAST NOTIFICATIONS  (replaces all alert())
// ═══════════════════════════════════════════════════
function notify(message, type = 'info', duration = 5000) {
    const icons  = { error:'⛔', warn:'⚠️', ok:'✓', info:'◈' };
    const titles = { error:'Error', warn:'Warning', ok:'Success', info:'Notice' };

    const toast = document.createElement('div');
    toast.className = `toast type-${type}`;
    toast.innerHTML = `
        <div class="toast-icon">${icons[type] || '◈'}</div>
        <div class="toast-body">
            <div class="toast-title">${titles[type] || type}</div>
            <div class="toast-msg">${message.replace(/\n/g, '<br>')}</div>
        </div>
        <button class="toast-close" onclick="dismissToast(this.parentElement)">×</button>
    `;

    const container = document.getElementById('toastContainer');
    container.appendChild(toast);

    if (duration > 0) {
        setTimeout(() => dismissToast(toast), duration);
    }
    return toast;
}

function dismissToast(toast) {
    if (!toast || toast.classList.contains('removing')) return;
    toast.classList.add('removing');
    toast.addEventListener('animationend', () => toast.remove(), { once: true });
}
let currentSidebarPath = "";
let selectedFilePath   = null;
let selectedFileName   = null;
let currentUsername    = "";
let allDirs            = [];
let templateMode       = false;   // true = editor has template content, no file backing it

// Wallet state
let lucidInstance = null;
let walletAddress = null;

// sessionStorage key — persists across reloads but NOT across tab-close
const WALLET_KEY   = 'plutus_wallet_name';
const NAV_PATH_KEY = 'plutus_sidebar_path';   // current folder
const SEL_FILE_KEY = 'plutus_selected_file';  // selected file path
const SEL_NAME_KEY = 'plutus_selected_name';  // selected file name

// ═══════════════════════════════════════════════════
//  MONACO INIT
// ═══════════════════════════════════════════════════
require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.39.0/min/vs' }});
require(['vs/editor/editor.main'], function () {

    // ── Haskell tokenizer ──
    monaco.languages.register({ id: 'haskell' });
    monaco.languages.setMonarchTokensProvider('haskell', {
        defaultToken: '', tokenPostfix: '.hs',
        keywords: ['case','class','data','default','deriving','do','else','foreign',
            'if','import','in','infix','infixl','infixr','instance','let',
            'module','newtype','of','then','type','where','qualified','as',
            'hiding','forall','family','mdo','rec','proc'],
        typeKeywords: ['Bool','Char','Double','Float','Int','Integer','IO','String',
            'Maybe','Either','Ordering','Word','Void','Show','Eq','Ord',
            'Num','Enum','Bounded','Read','Functor','Monad','Applicative',
            'Foldable','Traversable','Semigroup','Monoid'],
        operators: ['=','->','<-','::','=>','..','|','\\','@','~',
            '+','-','*','/','<','>','<=','>=','==','/=',
            '&&','||','>>','>>=','<$>','<*>','<|>','$','.',':'],
        symbols:  /[=><!~?:&|+\-*\/\^%@#.\\]+/,
        escapes:  /\\(?:[nrtfb\\"'&]|[0-9]+|x[0-9a-fA-F]+|o[0-7]+)/,
        tokenizer: {
            root: [
                [/\{-#.*?#-\}/, 'keyword.pragma'],
                [/\{-/, 'comment', '@blockComment'],
                [/--.*$/, 'comment'],
                [/"/, 'string', '@string'],
                [/'[^\\']'/, 'string'],
                [/(')(@escapes)(')/, ['string','string.escape','string']],
                [/0[xX][0-9a-fA-F]+/, 'number.hex'],
                [/[0-9]+\.[0-9]+([eE][-+]?[0-9]+)?/, 'number.float'],
                [/[0-9]+/, 'number'],
                [/[A-Z][a-zA-Z0-9_']*/, { cases: { '@typeKeywords': 'type.keyword', '@default': 'type' } }],
                [/[a-z_][a-zA-Z0-9_']*/, { cases: { '@keywords': 'keyword', '@default': 'identifier' } }],
                [/@symbols/, { cases: { '@operators': 'operator', '@default': 'operator' } }],
                [/[{}()\[\]]/, 'delimiter'], [/[,;]/, 'delimiter'], [/\s+/, 'white'],
            ],
            blockComment: [
                [/[^{-]+/, 'comment'], [/\{-/, 'comment', '@push'],
                [/-\}/, 'comment', '@pop'], [/[{-]/, 'comment'],
            ],
            string: [
                [/[^\\"]+/, 'string'], [/@escapes/, 'string.escape'],
                [/\\./, 'string.escape.invalid'], [/"/, 'string', '@pop'],
            ],
        }
    });

    // ── Theme ──
    monaco.editor.defineTheme('haskell-dark', {
        base: 'vs-dark', inherit: true,
        rules: [
            { token: 'keyword',        foreground: 'c792ea', fontStyle: 'bold' },
            { token: 'keyword.pragma', foreground: '546e7a', fontStyle: 'italic' },
            { token: 'type',           foreground: 'ffcb6b' },
            { token: 'type.keyword',   foreground: 'ffcb6b', fontStyle: 'bold' },
            { token: 'comment',        foreground: '546e7a', fontStyle: 'italic' },
            { token: 'string',         foreground: 'c3e88d' },
            { token: 'string.escape',  foreground: '89ddff' },
            { token: 'number',         foreground: 'f78c6c' },
            { token: 'operator',       foreground: '89ddff' },
            { token: 'delimiter',      foreground: '89ddff' },
            { token: 'identifier',     foreground: 'eeffff' },
        ],
        colors: {
            'editor.background':                 '#1a1a24',
            'editor.foreground':                 '#eeffff',
            'editorLineNumber.foreground':       '#3a3a5c',
            'editorLineNumber.activeForeground': '#7c3aed',
            'editor.lineHighlightBackground':    '#1e1e30',
            'editorCursor.foreground':           '#c792ea',
            'editor.selectionBackground':        '#3a2d6a',
            'editorGutter.background':           '#16161f',
        }
    });

    window.editor = monaco.editor.create(document.getElementById('editor'), {
        value: "-- Select or create a file in the sidebar\n",
        language: 'haskell',
        theme: 'haskell-dark',
        automaticLayout: true,
        fontSize: 14,
        minimap: { enabled: false },
        scrollbar: { vertical: 'visible' },
        renderLineHighlight: 'line',
        bracketPairColorization: { enabled: true },
    });

    // ── GHC markers ──
    window.setGHCMarkers = function(logText) {
        const model = window.editor.getModel();
        if (!model) return;
        const markers = [];
        const pat = /^.*?:(\d+):(\d+)(?:-\d+)?:\s*(error|warning):\s*([\s\S]*?)(?=\n\S|\n\n|$)/gm;
        let m;
        while ((m = pat.exec(logText)) !== null) {
            markers.push({
                startLineNumber: +m[1], startColumn: +m[2],
                endLineNumber:   +m[1], endColumn:   +m[2] + 1,
                message:  m[4].trim().replace(/\n\s+/g, ' '),
                severity: m[3] === 'error' ? monaco.MarkerSeverity.Error : monaco.MarkerSeverity.Warning,
            });
        }
        monaco.editor.setModelMarkers(model, 'ghc', markers);
    };

    // ── Auth check, then auto-reconnect wallet ──
    fetch('/auth/me')
        .then(r => { if (!r.ok) return window.location.href = '/login'; return r.json(); })
        .then(async data => {
            if (!data) return;
            currentUsername = data.username;
            document.getElementById('userLabel').textContent  = data.username;
            document.getElementById('userAvatar').textContent = data.username[0].toUpperCase();

            // ── Restore navigation state from sessionStorage ──
            const savedPath = sessionStorage.getItem(NAV_PATH_KEY);
            const savedFile = sessionStorage.getItem(SEL_FILE_KEY);
            const savedName = sessionStorage.getItem(SEL_NAME_KEY);

            if (savedPath) currentSidebarPath = savedPath;
            await refreshFiles();

            // Re-open the previously selected file silently
            if (savedFile && savedName) {
                try {
                    const r = await fetch(`/workspace/file?name=${encodeURIComponent(savedFile)}`);
                    if (r.ok) {
                        window.editor.setValue(await r.text());
                        const ext = savedName.split('.').pop().toLowerCase();
                        monaco.editor.setModelLanguage(window.editor.getModel(),
                            { hs:'haskell', json:'json', md:'markdown' }[ext] || 'plaintext');
                        selectedFilePath = savedFile;
                        selectedFileName = savedName;
                        document.getElementById('activeFile').textContent = '> ' + savedName;
                        document.getElementById('runFileBtn').disabled = !savedName.endsWith('.hs');
                        refreshFiles(); // refresh to highlight active file
                    } else {
                        // File no longer exists — clear stale state
                        sessionStorage.removeItem(SEL_FILE_KEY);
                        sessionStorage.removeItem(SEL_NAME_KEY);
                    }
                } catch (_) {}
            }

            tryAutoReconnect();
        })
        .catch(() => window.location.href = '/login');
});

// ═══════════════════════════════════════════════════
//  WALLET
// ═══════════════════════════════════════════════════

/**
 * On reload, silently re-enable the previously used wallet.
 * Most wallets allow this without a user popup if the site is already approved.
 */
async function tryAutoReconnect() {
    const saved = sessionStorage.getItem(WALLET_KEY);
    if (!saved) return;
    try {
        await connectWallet(saved, /* silent */ true);
    } catch (_) {
        sessionStorage.removeItem(WALLET_KEY);
    }
}

/**
 * Connect (or re-connect silently) a Cardano wallet.
 * @param {string|null} name    - 'nami' | 'lace' | 'eternl' | null = auto-detect
 * @param {boolean}     silent  - suppress alerts (used for auto-reconnect on reload)
 */
async function connectWallet(name = null, silent = false) {
    // Wait for Lucid ES module to finish loading (it's async)
    if (!window._lucidReady) {
        await new Promise(resolve => window.addEventListener('lucid-ready', resolve, { once: true }));
    }

    if (!window.cardano) {
        if (!silent) notify("No Cardano wallet extension detected.\nPlease install Nami, Lace, or Eternl.", 'error');
        return;
    }

    // Auto-detect first available wallet
    if (!name) {
        if      (window.cardano.lace)   name = 'lace';
        else if (window.cardano.nami)   name = 'nami';
        else if (window.cardano.eternl) name = 'eternl';
        else {
            if (!silent) notify("No supported wallet found.\nPlease install Nami, Lace, or Eternl.", 'error');
            return;
        }
    }

    if (!window.cardano[name]) {
        if (!silent) notify(`Wallet "${name}" not found.`, 'error');
        sessionStorage.removeItem(WALLET_KEY);
        return;
    }

    try {
        const api = await window.cardano[name].enable();

        lucidInstance = await Lucid.new(
            new Blockfrost(
                "https://cardano-preprod.blockfrost.io/api/v0",
                "preprodYjRkHfcazNkL0xxG9C2RdUbUoTrG7wip"
            ),
            "Preprod"
        );
        lucidInstance.selectWallet(api);
        walletAddress = await lucidInstance.wallet.address();

        // Persist wallet name across reloads (sessionStorage: cleared on tab close)
        sessionStorage.setItem(WALLET_KEY, name);

        _updateWalletUI(walletAddress);

        // If CBOR already compiled, recompute validator address now
        const cbor = document.getElementById('cbor').textContent.trim();
        if (cbor) _setValidatorAddr(_computeValidatorAddr(cbor));

    } catch (e) {
        if (!silent) notify("Wallet connection failed:\n" + e.message, 'error');
        sessionStorage.removeItem(WALLET_KEY);
    }
}

function disconnectWallet() {
    lucidInstance = null;
    walletAddress = null;
    sessionStorage.removeItem(WALLET_KEY);

    const btn = document.getElementById('connectWalletBtn');
    btn.textContent = '⬡ Connect Wallet';
    btn.title = '';
    btn.classList.remove('connected');

    const el = document.getElementById('walletAddr');
    el.textContent = '— wallet not connected —';
    el.classList.add('empty');
    el.title = 'Connect wallet first';

    // Validator address also depends on network; clear it
    _setValidatorAddr(null);
}

function handleWalletBtn() {
    if (walletAddress) disconnectWallet();
    else connectWallet();
}

function _updateWalletUI(addr) {
    const short = addr.slice(0, 14) + '…' + addr.slice(-6);
    const btn   = document.getElementById('connectWalletBtn');
    btn.textContent = '✓ ' + short;
    btn.title = addr + '\n(click to disconnect)';
    btn.classList.add('connected');

    const el = document.getElementById('walletAddr');
    el.textContent = addr;
    el.classList.remove('empty');
    el.title = 'Click to copy';
}

function _computeValidatorAddr(cborHex) {
    if (!lucidInstance || !cborHex) return null;
    try {
        return lucidInstance.utils.validatorToAddress({ type: "PlutusV2", script: cborHex });
    } catch (e) {
        console.warn("Could not derive validator address:", e);
        return null;
    }
}

function _setValidatorAddr(addr) {
    const el = document.getElementById('validatorAddr');
    if (addr) {
        el.textContent = addr;
        el.classList.remove('empty');
        el.title = 'Click to copy';
    } else {
        el.textContent = lucidInstance
            ? '— compile to generate —'
            : '— connect wallet to compute —';
        el.classList.add('empty');
    }
}

function copyAddr(id) {
    const el   = document.getElementById(id);
    if (el.classList.contains('empty')) return;
    navigator.clipboard.writeText(el.textContent).then(() => {
        const fb = document.getElementById('copyOk');
        fb.textContent = 'Copied ✓';
        setTimeout(() => { fb.textContent = ''; }, 1500);
    });
}

// ═══════════════════════════════════════════════════
//  AUTH LOGOUT
// ═══════════════════════════════════════════════════
async function logout() {
    sessionStorage.removeItem(WALLET_KEY);
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/login';
}

// ═══════════════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════════════
async function refreshFiles() {
    try {
        const r = await fetch(`/workspace/files?path=${encodeURIComponent(currentSidebarPath)}`);
        if (r.redirected || r.status === 401) return window.location.href = '/login';
        const items = await r.json();

        document.getElementById('sidebarPath').textContent =
            `~/${currentUsername}${currentSidebarPath ? '/' + currentSidebarPath : ''}`;

        items.filter(i => i.isDirectory).forEach(i => {
            if (!allDirs.includes(i.fullPath)) allDirs.push(i.fullPath);
        });

        const sorted = [...items].sort((a, b) => {
            if (a.isDirectory && !b.isDirectory) return -1;
            if (!a.isDirectory && b.isDirectory) return 1;
            return a.name.localeCompare(b.name);
        });

        let html = '';
        if (currentSidebarPath !== '')
            html += `<div class="file-item back" onclick="sidebarGoBack()">📁 ..</div>`;
        if (sorted.length === 0)
            html += `<div style="padding:14px 12px;font-size:11px;color:#444;font-style:italic;">No files — click ＋ to create one</div>`;

        sorted.forEach(item => {
            const icon = item.isDirectory ? '📁' : (item.name.endsWith('.hs') ? 'λ' : '📄');
            const sp   = item.fullPath.replace(/'/g, "\\'");
            const sn   = item.name.replace(/'/g, "\\'");
            const act  = item.isDirectory ? `sidebarNavigate('${sp}')` : `selectFile('${sp}','${sn}')`;
            const cBtn = (!item.isDirectory && item.name.endsWith('.hs'))
                ? `<span class="compile-ico" onclick="event.stopPropagation();runWorkspaceFile('${sp}','${sn}')" title="Compile">▶</span>`
                : '';
            const delBtn = `<div class="file-actions">
                <button class="file-act-btn" onclick="event.stopPropagation();openDeleteModal('${sp}','${sn}',${item.isDirectory})" title="Delete">🗑</button>
            </div>`;
            html += `<div class="file-item ${item.isDirectory?'is-dir':''} ${item.fullPath===selectedFilePath?'active':''}" onclick="${act}">
                <div class="file-item-label">${icon} ${item.name}</div>${cBtn}${delBtn}
            </div>`;
        });
        document.getElementById('fileList').innerHTML = html;
    } catch (e) {
        document.getElementById('fileList').innerHTML =
            `<div style="padding:10px;color:#f44;font-size:11px;">Connection error</div>`;
    }
}

function sidebarNavigate(fp) {
    currentSidebarPath = fp;
    sessionStorage.setItem(NAV_PATH_KEY, fp);
    refreshFiles();
}
function sidebarGoBack() {
    const parts = currentSidebarPath.split('/').filter(Boolean);
    parts.pop();
    currentSidebarPath = parts.join('/');
    sessionStorage.setItem(NAV_PATH_KEY, currentSidebarPath);
    refreshFiles();
}

async function selectFile(fullPath, fileName) {
    try {
        const r = await fetch(`/workspace/file?name=${encodeURIComponent(fullPath)}`);
        if (!r.ok) throw new Error(await r.text());
        window.editor.setValue(await r.text());
        const ext = fileName.split('.').pop().toLowerCase();
        monaco.editor.setModelLanguage(window.editor.getModel(),
            { hs:'haskell', json:'json', md:'markdown' }[ext] || 'plaintext');
        monaco.editor.setModelMarkers(window.editor.getModel(), 'ghc', []);
        selectedFilePath = fullPath;
        selectedFileName = fileName;
        sessionStorage.setItem(SEL_FILE_KEY, fullPath);
        sessionStorage.setItem(SEL_NAME_KEY, fileName);

        // Exit template mode — file takes over
        if (templateMode) {
            templateMode = false;
            _preTemplateSnapshot = null;
            document.getElementById('activeFile').style.color = '#a78bfa';
            document.getElementById('templateSelect').value = '';
        }

        document.getElementById('activeFile').textContent = '> ' + fileName;
        document.getElementById('runFileBtn').disabled = !fileName.endsWith('.hs');
        refreshFiles();
    } catch (e) { notify('Error opening file: ' + e.message, 'error'); }
}

// ═══════════════════════════════════════════════════
//  SAVE
// ═══════════════════════════════════════════════════
document.getElementById('saveBtn').onclick = async () => {
    if (!selectedFilePath) return notify("No file selected. Click a file in the sidebar first.", 'warn');
    const r = await fetch('/workspace/save', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filePath: selectedFilePath, content: window.editor.getValue() })
    });
    if (r.ok) { setStatus('Saved ✓', '#34d399'); setTimeout(() => setStatus('', '#888'), 2000); }
    else setStatus('Save error', '#f87171');
};

// ═══════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════
document.getElementById('newFileBtn').onclick = () => openModal('file');

// ── Modal type state ──
let _modalType = 'file';

function setModalType(type) {
    _modalType = type;
    document.getElementById('toggleFile').classList.toggle('active',   type === 'file');
    document.getElementById('toggleFolder').classList.toggle('active', type === 'folder');
    document.getElementById('modalTitle').textContent     = type === 'file' ? '+ New file' : '+ New folder';
    document.getElementById('modalNameLabel').textContent = type === 'file' ? 'File name'  : 'Folder name';
    document.getElementById('modalConfirmBtn').textContent = type === 'file' ? 'Create file' : 'Create folder';
    document.getElementById('modalHint').textContent = type === 'file'
        ? 'Must start with uppercase, end with .hs'
        : 'Lowercase letters, numbers and hyphens only';
    document.getElementById('modalName').placeholder = type === 'file' ? 'ex: MyValidator.hs' : 'ex: contracts';
    document.getElementById('modalName').value = '';
}

function openModal(type = 'file') {
    const sel = document.getElementById('modalDir');
    sel.innerHTML = `<option value="">/ (root)</option>`;
    allDirs.forEach(d => { sel.innerHTML += `<option value="${d}" ${d === currentSidebarPath ? 'selected' : ''}>${d}/</option>`; });
    setModalType(type);
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('modalName').focus(), 100);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').onclick = e => { if (e.target.id === 'modalOverlay') closeModal(); };

async function confirmCreate() {
    const dir  = document.getElementById('modalDir').value;
    const name = document.getElementById('modalName').value.trim();

    if (_modalType === 'folder') {
        if (!name) return notify("Enter a folder name", 'warn');
        if (!/^[a-zA-Z0-9_-]+$/.test(name)) return notify("Folder: letters, numbers, - and _ only", 'warn');
        const fp = dir ? `${dir}/${name}` : name;
        const r = await fetch('/workspace/mkdir', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dirPath: fp })
        });
        if (!r.ok) return notify('Error creating folder: ' + await r.text(), 'error');
        allDirs.push(fp);
        closeModal();
        currentSidebarPath = fp;
        await refreshFiles();
        notify(`Folder "${name}" created`, 'ok', 3000);
    } else {
        if (!name) return notify("Enter a file name", 'warn');
        if (!name.endsWith('.hs')) return notify("The file must end with .hs", 'warn');
        if (!/^[A-Z]/.test(name)) return notify("The name must start with an uppercase letter (Haskell convention)", 'warn');
        const mod  = name.replace('.hs', '');
        const fp   = dir ? `${dir}/${name}` : name;
        const content = `module ${mod} where\n\nimport qualified PlutusTx\nimport PlutusTx.Prelude\nimport Plutus.V2.Ledger.Api\n\n{-# INLINABLE mkValidator #-}\nmkValidator :: BuiltinData -> BuiltinData -> BuiltinData -> ()\nmkValidator _ _ _ = ()\n`;
        const r = await fetch('/workspace/create', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filePath: fp, content })
        });
        if (!r.ok) return notify('Error creating file: ' + await r.text(), 'error');
        closeModal();
        currentSidebarPath = dir;
        await refreshFiles();
        await selectFile(fp, name);
    }
}

document.getElementById('modalName').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmCreate();
    if (e.key === 'Escape') closeModal();
});

// ── Delete modal ──
let _deleteTarget = null;

function openDeleteModal(fullPath, name, isDir) {
    _deleteTarget = { fullPath, name, isDir };
    document.getElementById('deleteMsg').textContent =
        `Are you sure you want to delete ${isDir ? 'folder' : 'file'} "${name}"?` +
        (isDir ? '\n\nThis will delete all files inside.' : '');
    document.getElementById('deleteOverlay').classList.add('open');
}

function closeDeleteModal() {
    document.getElementById('deleteOverlay').classList.remove('open');
    _deleteTarget = null;
}
document.getElementById('deleteOverlay').onclick = e => { if (e.target.id === 'deleteOverlay') closeDeleteModal(); };

async function confirmDelete() {
    if (!_deleteTarget) return;
    const { fullPath, name, isDir } = _deleteTarget;
    closeDeleteModal();

    const r = await fetch('/workspace/delete', {
        method: 'DELETE', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ itemPath: fullPath, isDirectory: isDir })
    });

    if (!r.ok) return notify('Delete failed: ' + await r.text(), 'error');

    // If the deleted file was open, clear editor
    if (!isDir && selectedFilePath === fullPath) {
        selectedFilePath = null;
        selectedFileName = null;
        sessionStorage.removeItem(SEL_FILE_KEY);
        sessionStorage.removeItem(SEL_NAME_KEY);
        if (window.editor) window.editor.setValue('-- Select or create a file in the sidebar\n');
        document.getElementById('activeFile').textContent = '';
        document.getElementById('runFileBtn').disabled = true;
    }
    // If deleted folder was the current nav path, go back to root
    if (isDir && currentSidebarPath.startsWith(fullPath)) {
        currentSidebarPath = '';
        sessionStorage.setItem(NAV_PATH_KEY, '');
    }
    allDirs = allDirs.filter(d => !d.startsWith(fullPath));
    await refreshFiles();
    notify(`"${name}" deleted`, 'ok', 3000);
}

// ═══════════════════════════════════════════════════
//  COMPILATION
// ═══════════════════════════════════════════════════
document.getElementById('runFileBtn').onclick = () => {
    const vName = document.getElementById('validatorNameInput').value.trim();
    if (!vName) return notify("Please enter a validator name in the toolbar input field.", 'warn');

    if (templateMode) {
        // Template mode: compile editor content directly (no file, no save)
        runCode({ code: window.editor.getValue(), validatorName: vName });
    } else if (selectedFileName) {
        runWorkspaceFile(selectedFilePath, selectedFileName);
    }
};

function runWorkspaceFile(fullPath, fileName) {
    const vName = document.getElementById('validatorNameInput').value.trim();
    if (!vName) return notify("Please enter a validator name in the toolbar input field.", 'warn');

    // Always save current editor content before compiling
    // Pass fullPath (e.g. "contracts/Three.hs") so the backend finds the file
    fetch('/workspace/save', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filePath: fullPath, content: window.editor.getValue() })
    }).then(() => runCode({ fileName: fullPath, validatorName: vName }));
}

async function runCode(body) {
    document.getElementById('runFileBtn').disabled = true;
    setStatus('Compiling...', '#f0a500');
    document.getElementById('logs').textContent = '';
    document.getElementById('std').textContent  = '';
    document.getElementById('cbor').textContent = '';
    _setValidatorAddr(null);

    if (window.editor && window.setGHCMarkers)
        monaco.editor.setModelMarkers(window.editor.getModel(), 'ghc', []);

    let hasError = false, fullLog = '', cborResult = null;

    try {
        const res = await fetch('/run', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        function processLines(b) {
            const lines = b.split('\n');
            const rem   = lines.pop();
            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                try {
                    const { type, output } = JSON.parse(line.slice(6));
                    if (type === 'compilation') {
                        switchTab('logs');
                        document.getElementById('logs').textContent += output;
                        document.getElementById('logs').scrollTop = document.getElementById('logs').scrollHeight;
                        fullLog += output;
                        if (/^.*error:/.test(output) || output.includes('Build failed')) hasError = true;
                    } else if (type === 'cbor') {
                        cborResult = output;
                        document.getElementById('cbor').textContent = output;
                        switchTab('cbor');
                    } else if (type === 'download') {
                        const btn = document.getElementById('downloadBtn');
                        btn.dataset.url = output;
                        btn.disabled = false;
                    } else {
                        document.getElementById('std').textContent += output;
                        document.getElementById('std').scrollTop = document.getElementById('std').scrollHeight;
                    }
                } catch (_) {}
            }
            return rem;
        }

        while (true) {
            const { done, value } = await reader.read();
            if (done) {
                if (buf.trim()) processLines(buf + '\n');
                if (window.setGHCMarkers) window.setGHCMarkers(fullLog);
                break;
            }
            buf += decoder.decode(value, { stream: true });
            buf  = processLines(buf);
        }

        // ── Derive validator address from CBOR once stream is done ──
        if (cborResult && !hasError) {
            const addr = _computeValidatorAddr(cborResult);
            _setValidatorAddr(addr);
        }

        setStatus(hasError ? 'Build failed' : 'Success ✓', hasError ? '#f87171' : '#34d399');

    } catch (e) {
        document.getElementById('logs').textContent += `\nNetwork error: ${e.message}`;
        setStatus('Network error', '#f87171');
    }
    document.getElementById('runFileBtn').disabled = !selectedFileName?.endsWith('.hs');
}

// ═══════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════
// ═══════════════════════════════════════════════════
//  PANEL TABS (right column)
// ═══════════════════════════════════════════════════
function switchTab(name) {
    document.querySelectorAll('.ptab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    document.querySelectorAll('.panel-body').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
    // Auto-switch to GHC tab when compilation starts
    if (name === 'logs') document.getElementById('logs').scrollTop = document.getElementById('logs').scrollHeight;
}
function setStatus(msg, color) {
    document.getElementById('statusEl').textContent = msg;
    document.getElementById('statusEl').style.color = color;
}
function copyPanel(id) {
    const el   = document.getElementById(id);
    const text = el.textContent.trim();
    if (!text) return;

    navigator.clipboard.writeText(text).then(() => {
        // Inject flash overlay if not already present
        let flash = el.querySelector('.copy-flash');
        if (!flash) {
            flash = document.createElement('div');
            flash.className = 'copy-flash';
            flash.textContent = 'Copied ✓';
            // Panel must be position:relative — set it
            el.style.position = 'relative';
            el.appendChild(flash);
        }

        // Force reflow so transition fires cleanly
        flash.classList.remove('hide');
        flash.classList.add('show');

        clearTimeout(el._copyTimer);
        el._copyTimer = setTimeout(() => {
            flash.classList.remove('show');
            flash.classList.add('hide');
        }, 900);
    });
}

// Keep legacy name in case called from elsewhere
function copyCBOR() { copyPanel('cbor'); }

// ═══════════════════════════════════════════════════
//  TEMPLATES  (Outcome #69787)
// ═══════════════════════════════════════════════════

// Snapshot of the file that was open before loading a template
let _preTemplateSnapshot = null;

async function loadTemplates() {
    try {
        const res  = await fetch('/templates');
        if (!res.ok) return;
        const list = await res.json();
        const sel  = document.getElementById('templateSelect');
        list.forEach(t => {
            const opt = document.createElement('option');
            opt.value       = t.id;
            opt.textContent = t.name;
            opt.title       = t.description;
            sel.appendChild(opt);
        });

        sel.addEventListener('change', async () => {
            const id = sel.value;
            if (!id) {
                // User selected "Templates…" → restore previous file if any
                _restorePreTemplateFile();
                return;
            }

            const r = await fetch(`/templates/${id}`);
            if (!r.ok) return;
            const t = await r.json();

            // Save a snapshot of the current editor state BEFORE overwriting
            // Only save once (don't overwrite snapshot if already in template mode)
            if (!templateMode) {
                _preTemplateSnapshot = {
                    content:       window.editor ? window.editor.getValue() : '',
                    filePath:      selectedFilePath,
                    fileName:      selectedFileName,
                    validatorName: document.getElementById('validatorNameInput').value,
                    activeLabel:   document.getElementById('activeFile').textContent,
                };
            }

            // Enter template mode
            templateMode = true;
            if (window.editor) window.editor.setValue(t.source);
            document.getElementById('validatorNameInput').value = t.validatorFn || '';
            document.getElementById('runFileBtn').disabled = false;
            document.getElementById('activeFile').textContent = `[template: ${t.name}]`;
            document.getElementById('activeFile').style.color = '#fbbf24';
            setStatus('Template loaded — compile without saving', '#fbbf24');
            notify(`Template "${t.name}" loaded.\nCompile directly or open a file to go back.`, 'info', 4000);
        });
    } catch (_) {}
}

function _restorePreTemplateFile() {
    if (!_preTemplateSnapshot) {
        // No snapshot — just exit template mode
        templateMode = false;
        document.getElementById('activeFile').textContent = '';
        document.getElementById('activeFile').style.color = '#a78bfa';
        document.getElementById('runFileBtn').disabled = !selectedFileName?.endsWith('.hs');
        return;
    }

    const snap = _preTemplateSnapshot;
    _preTemplateSnapshot = null;
    templateMode = false;

    if (window.editor) window.editor.setValue(snap.content);
    document.getElementById('validatorNameInput').value = snap.validatorName || '';
    document.getElementById('activeFile').textContent   = snap.activeLabel || '';
    document.getElementById('activeFile').style.color   = '#a78bfa';
    document.getElementById('runFileBtn').disabled      = !snap.fileName?.endsWith('.hs');
    setStatus('', '');
}

// ═══════════════════════════════════════════════════
//  ARTIFACT DOWNLOAD  (Outcome #69788 / #69789)
// ═══════════════════════════════════════════════════
document.getElementById('downloadBtn').addEventListener('click', () => {
    const url = document.getElementById('downloadBtn').dataset.url;
    if (!url) return;
    const a = document.createElement('a');
    a.href     = url;
    a.download = '';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
});

// ═══════════════════════════════════════════════════
//  VERSION BADGE  (Outcome #69789)
// ═══════════════════════════════════════════════════
async function fetchAndShowVersion() {
    try {
        const r    = await fetch('/version');
        const data = await r.json();
        const badge = document.getElementById('versionBadge');
        const ghcShort = (data.ghc || 'GHC').replace('The Glorious Glasgow Haskell Compilation System, version ', 'GHC ');
        badge.textContent = ghcShort;
        badge.title       = [data.ghc, data.cabal, data.nix].filter(Boolean).join('\n');
    } catch (_) {}
}

function showVersions() {
    const badge = document.getElementById('versionBadge');
    notify(badge.title || 'Version info not available', 'info', 6000);
}

// ═══════════════════════════════════════════════════
//  INIT: load templates + version on page load
// ═══════════════════════════════════════════════════
window.addEventListener('load', () => {
    loadTemplates();
    fetchAndShowVersion();
    // Reset download btn on every new compile start
    const origRunFileBtn = document.getElementById('runFileBtn');
    origRunFileBtn.addEventListener('click', () => {
        const btn = document.getElementById('downloadBtn');
        btn.disabled    = true;
        btn.dataset.url = '';
    }, true);
});
</script>
<script>
// ════════════════════════════════════════════════════════════════
//  PLUTUS TERMINAL
// ════════════════════════════════════════════════════════════════
(function () {
    const $out = () => document.getElementById('termOutput');
    const $inp = () => document.getElementById('termInput');
    let _hist = [], _histIdx = -1, _histDraft = '';

    function termPrint(text, cls = 'term-stdout') {
        const out = $out();
        String(text).split('\n').forEach(l => {
            const s = document.createElement('span');
            s.className = `term-line ${cls}`;
            s.textContent = l;
            out.appendChild(s);
        });
        out.scrollTop = out.scrollHeight;
    }
    const termInfo    = t => termPrint(t, 'term-info');
    const termSuccess = t => termPrint(t, 'term-success');
    const termError   = t => termPrint(t, 'term-error');
    const termWarn    = t => termPrint(t, 'term-warn');
    const termMuted   = t => termPrint(t, 'term-muted');
    const termCmd     = t => termPrint(t, 'term-cmd');

    window.termClear = () => { $out().innerHTML = ''; termMuted('Terminal cleared.'); };

    function termSpinner(label) {
        const out = $out(), wrap = document.createElement('span');
        wrap.className = 'term-line term-info';
        const sp = document.createElement('span'); sp.className = 'term-spinner';
        wrap.appendChild(sp); wrap.appendChild(document.createTextNode(label));
        out.appendChild(wrap); out.scrollTop = out.scrollHeight;
        return wrap;
    }

    function termBanner() {
        termMuted('┌────────────────────────────────────┐');
        termMuted('│  ⬡  PLUTUS IDE  —  Terminal         │');
        termMuted('└────────────────────────────────────┘');
        termMuted("  Type  help  for available commands.");
        termMuted('');
    }

    const COMMANDS = {
        help() {
            termInfo('Commands:');
            termPrint('  compile <validator> [file.hs]', 'term-info');
            termPrint('  run  (alias for compile)',      'term-info');
            termPrint('  set validator <name>',          'term-info');
            termPrint('  status · file · clear · help',  'term-info');
            termMuted('');
            termMuted('Examples:');
            termCmd('  compile myValidator');
            termCmd('  compile myValidator contracts/Main.hs');
            termCmd('  set validator alwaysSucceeds');
        },
        clear() { window.termClear(); },
        status() {
            const v = document.getElementById('validatorNameInput')?.value?.trim() || '(none)';
            termInfo('Status:');
            termPrint(`  File      : ${window.selectedFileName || '(none)'}`, 'term-stdout');
            termPrint(`  Path      : ${window.selectedFilePath || '(none)'}`, 'term-stdout');
            termPrint(`  Validator : ${v || '(not set)'}`, 'term-stdout');
        },
        file() { termPrint(`  ${window.selectedFilePath || '(no file selected)'}`, 'term-stdout'); },
        set(args) {
            if (args[0] !== 'validator') return termError(`Unknown: "${args[0]}". Try: set validator <n>`);
            const name = args.slice(1).join(' ').trim();
            if (!name) return termError('Usage: set validator <name>');
            const inp = document.getElementById('validatorNameInput');
            if (!inp) return termError('Input not found.');
            inp.value = name;
            termSuccess(`✓ Validator → "${name}"`);
        },
        run(args) { COMMANDS.compile(args); },
        compile(args) {
            let vName = args[0] || document.getElementById('validatorNameInput')?.value?.trim() || '';
            let filePath = args[1] || window.selectedFilePath || null;
            if (!vName) { termError('Error: validator name required.'); termWarn('Usage: compile <validator>'); return; }
            if (!filePath) { termError('Error: no active .hs file.'); termWarn('  compile myValidator contracts/Main.hs'); return; }
            if (!filePath.endsWith('.hs')) { termError(`Not a Haskell file: ${filePath.split('/').pop()}`); return; }
            const vInp = document.getElementById('validatorNameInput');
            if (vInp && !vInp.value.trim()) vInp.value = vName;
            termCmd(`$ compile ${vName} ${filePath}`); termMuted('');
            const spinEl = termSpinner(`Saving…`);
            const code = window.editor?.getValue() ?? null;
            fetch('/workspace/save', { method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify(code !== null ? {filePath, content:code} : {filePath}) })
            .then(() => { spinEl.remove(); _termRun({ fileName:filePath, validatorName:vName }); })
            .catch(err => { spinEl.remove(); termWarn(`Save: ${err.message}. Compiling anyway…`); _termRun({ fileName:filePath, validatorName:vName }); });
        },
    };

    async function _termRun(body) {
        const runBtn = document.getElementById('runFileBtn');
        if (runBtn) runBtn.disabled = true;
        ['logs','std','cbor'].forEach(id => document.getElementById(id).textContent = '');
        const spinEl = termSpinner('GHC compiling…');
        let hasError = false, fullLog = '', cborResult = null;
        try {
            const res = await fetch('/run', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
            const reader = res.body.getReader(), decoder = new TextDecoder();
            let buf = '';
            function processLines(b) {
                const lines = b.split('\n'), rem = lines.pop();
                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    try {
                        const { type, output } = JSON.parse(line.slice(6));
                        if (type === 'compilation') {
                            switchTab('logs');
                            document.getElementById('logs').textContent += output;
                            document.getElementById('logs').scrollTop = document.getElementById('logs').scrollHeight;
                            fullLog += output;
                            const isErr = /^.*error:/.test(output) || output.includes('Build failed');
                            const isOk  = output.includes('written successfully') || output.includes('Cache hit');
                            if (isErr) { hasError = true; termError(output.trimEnd()); }
                            else if (isOk) termSuccess(output.trimEnd());
                            else if (output.trim()) termPrint(output.trimEnd(), 'term-stdout');
                        } else if (type === 'cbor') {
                            cborResult = output;
                            document.getElementById('cbor').textContent = output;
                            switchTab('cbor');
                            termMuted(''); termSuccess('✓ CBOR:');
                            termPrint(output.slice(0,80) + (output.length > 80 ? '…' : ''), 'term-cbor');
                        } else if (type === 'download') {
                            const btn = document.getElementById('downloadBtn');
                            if (btn) { btn.dataset.url = output; btn.disabled = false; }
                            termSuccess('✓ Artifact ready → ⬇ .plutus');
                        } else if (output.trim()) {
                            document.getElementById('std').textContent += output;
                            document.getElementById('std').scrollTop = document.getElementById('std').scrollHeight;
                            termPrint(output.trimEnd(), 'term-stdout');
                        }
                    } catch(_) {}
                }
                return rem;
            }
            while (true) {
                const { done, value } = await reader.read();
                if (done) { if (buf.trim()) processLines(buf+'\n'); if (window.setGHCMarkers) window.setGHCMarkers(fullLog); break; }
                buf += decoder.decode(value, {stream:true}); buf = processLines(buf);
            }
            if (cborResult && !hasError && window._computeValidatorAddr) {
                const addr = window._computeValidatorAddr(cborResult);
                if (window._setValidatorAddr) window._setValidatorAddr(addr);
            }
        } catch(e) { document.getElementById('logs').textContent += `\nNetwork error: ${e.message}`; termError(`Network error: ${e.message}`); hasError = true; }
        spinEl.remove(); termMuted('');
        if (hasError) termError('✗ Build failed — see GHC tab.');
        else if (cborResult) termSuccess('✓ Build succeeded!');
        termMuted('');
        if (runBtn) runBtn.disabled = !window.selectedFileName?.endsWith('.hs');
    }

    function handleInput(raw) {
        const line = raw.trim();
        termPrint(`plutus ❯ ${line}`, 'term-cmd');
        if (!line) return;
        _hist.unshift(line); if (_hist.length > 100) _hist.pop();
        _histIdx = -1; _histDraft = '';
        const parts = line.split(/\s+/), cmd = parts[0].toLowerCase(), args = parts.slice(1);
        if (COMMANDS[cmd]) { try { COMMANDS[cmd](args); } catch(e) { termError(`Error: ${e.message}`); } }
        else { termError(`Unknown: "${cmd}"`); termWarn('  Type help for commands.'); }
        termMuted('');
    }

    window.addEventListener('load', () => {
        termBanner();
        const inp = $inp();
        if (!inp) return;
        inp.addEventListener('keydown', e => {
            if (e.key === 'Enter') { const v = inp.value; inp.value = ''; handleInput(v); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); if (_histIdx === -1) _histDraft = inp.value; if (_histIdx < _hist.length-1) { _histIdx++; inp.value = _hist[_histIdx]; setTimeout(() => inp.setSelectionRange(inp.value.length, inp.value.length),0); } }
            else if (e.key === 'ArrowDown') { e.preventDefault(); if (_histIdx > 0) { _histIdx--; inp.value = _hist[_histIdx]; } else if (_histIdx === 0) { _histIdx = -1; inp.value = _histDraft; } }
            else if (e.key === 'Tab') { e.preventDefault(); const v = inp.value, m = Object.keys(COMMANDS).find(c => c.startsWith(v.toLowerCase())); if (m) inp.value = m + ' '; }
            else if (e.key === 'l' && e.ctrlKey) { e.preventDefault(); window.termClear(); }
        });
        $out().addEventListener('click', () => inp.focus());
        setTimeout(() => inp.focus(), 400);
    });
})();
</script>
